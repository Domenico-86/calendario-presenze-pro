<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Calendario Presenze</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --gold: #FFD700;
            --gold-dark: #DAA520;
            --gold-dim: rgba(255,215,0,0.12);
            --gold-border: rgba(255,215,0,0.22);
            --success: #32CD32;
            --error: #ff6b6b;
            --info: #4a9eff;
            --warning: #FFA500;
            --bg: #080808;
            --bg2: #111111;
            --bg3: #1a1a1a;
            --bg4: #222222;
            --weekend-bg: #1a0f0f;
            --weekend-color: #ff7b7b;
            --text: #f0f0f0;
            --text-dim: #777;
            --radius: 10px;
            --transition: 0.18s ease;
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
            font-size: 14px;
        }

        /* ── HEADER ── */
        .app-header {
            background: #0e0e08;
            border-bottom: 1px solid var(--gold-border);
            padding: 10px 12px 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 3px 16px rgba(0,0,0,0.7);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .app-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            font-size: 22px;
            animation: glow 3s ease-in-out infinite;
            will-change: filter;
        }

        @keyframes glow {
            0%,100% { filter: drop-shadow(0 0 6px rgba(255,215,0,0.7)); }
            50%      { filter: drop-shadow(0 0 14px rgba(255,215,0,1)); }
        }

        .app-name {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--gold), var(--warning));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sync-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 9px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid var(--gold-border);
            background: var(--gold-dim);
            color: var(--gold);
            white-space: nowrap;
        }

        .sync-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--gold);
            flex-shrink: 0;
        }

        .sync-badge.syncing .sync-dot { background: var(--warning); animation: blink 0.5s infinite; }
        .sync-badge.error  { border-color: rgba(255,107,107,0.4); background: rgba(255,107,107,0.1); color: var(--error); }
        .sync-badge.error  .sync-dot { background: var(--error); animation: none; }
        .sync-badge.ok     { border-color: rgba(50,205,50,0.3); background: rgba(50,205,50,0.08); color: var(--success); }
        .sync-badge.ok     .sync-dot { background: var(--success); }

        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

        .header-actions { display: flex; align-items: center; gap: 6px; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            border: 1px solid var(--gold-border);
            border-radius: var(--radius);
            background: var(--gold-dim);
            color: var(--gold);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn:hover  { background: rgba(255,215,0,0.22); border-color: var(--gold); }
        .btn:active { transform: scale(0.96); }

        .header-row2 {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        #yearSelect {
            padding: 5px 10px;
            border-radius: var(--radius);
            border: 1px solid var(--gold-border);
            background: var(--bg3);
            color: var(--gold);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        #yearSelect:focus { outline: none; border-color: var(--gold); }

        /* ── TABS ── */
        .tabs-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: #0a0a06;
            border-top: 1px solid var(--gold-border);
            padding: 8px 10px 10px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            flex: 0 0 auto;
            padding: 7px 13px;
            border-radius: 18px;
            border: 1px solid var(--gold-border);
            background: transparent;
            color: var(--text-dim);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }

        .tab:hover  { color: var(--gold); border-color: var(--gold); }
        .tab.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            border-color: transparent;
            box-shadow: 0 2px 10px rgba(255,215,0,0.3);
        }

        /* ── TABLE LAYOUT ── */
        .table-outer {
            margin: 10px 4px;
            border-radius: 12px;
            border: 1px solid var(--gold-border);
            background: var(--bg2);
            overflow: hidden;
        }

        /* Header fisso */
        .table-header-wrap {
            position: sticky;
            top: 0;
            z-index: 50;
            overflow: hidden;
            background: var(--bg3);
            border-bottom: 2px solid var(--gold);
        }

        .table-header-wrap table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }

        .table-header-wrap th {
            background: var(--bg3);
            color: var(--gold);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 10px 4px;
            text-align: center;
            white-space: nowrap;
        }

        .table-header-wrap th:first-child {
            position: sticky;
            left: 0;
            z-index: 10;
            width: 58px;
            min-width: 58px;
            background: var(--bg3);
            border-right: 1px solid var(--gold-border);
        }

        /* Body scrollabile */
        .table-body-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table-body-wrap table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }

        td {
            border: 1px solid rgba(255,255,255,0.04);
            padding: 3px 3px;
            text-align: center;
        }

        /* Colonna data sticky */
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 10;
            width: 58px;
            min-width: 58px;
            max-width: 58px;
            background: var(--bg3);
            border-right: 1px solid var(--gold-border);
            font-size: 11px;
            font-weight: 700;
            color: var(--gold);
            padding: 6px 3px;
        }

        tr.weekend td:first-child {
            background: var(--weekend-bg) !important;
            color: var(--weekend-color);
        }

        tr.weekend td { background: rgba(255,40,40,0.04); }

        /* INPUT */
        input[type="text"] {
            width: 100%;
            padding: 7px 3px;
            border: 1px solid transparent;
            border-radius: 6px;
            background: var(--bg4);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            transition: var(--transition);
            -webkit-appearance: none;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--bg3);
            box-shadow: 0 0 0 2px rgba(255,215,0,0.15);
        }

        input[type="text"][readonly] {
            cursor: default;
            background: transparent;
            color: var(--gold);
            font-weight: 800;
        }

        input[type="text"]::placeholder {
            color: rgba(255,215,0,0.16);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        /* TOTALS */
        tr.totals-label td {
            background: var(--bg3);
            color: var(--gold);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 8px;
            border-top: 2px solid var(--gold-border);
        }

        tr.totals-numbers td {
            background: rgba(255,215,0,0.06);
            color: var(--gold);
            font-weight: 800;
            font-size: 12px;
            padding: 8px 4px;
        }

        tr.totals-amounts td {
            background: rgba(50,205,50,0.05);
            color: var(--success);
            font-weight: 800;
            font-size: 11px;
            padding: 8px 4px;
            border-bottom: 2px solid var(--gold-border);
        }

        /* ── SUMMARY ── */
        .summary {
            margin: 10px 4px 16px;
            background: var(--bg2);
            border: 1px solid var(--gold-border);
            border-radius: 12px;
            padding: 16px;
        }

        .summary-title {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
            text-align: center;
        }

        .pay-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius);
            background: var(--bg3);
            margin-bottom: 6px;
            border: 1px solid transparent;
        }

        .pay-row:last-child { margin-bottom: 0; }
        .pay-row.highlight { border-color: var(--gold-border); }

        .pay-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .pay-row.highlight .pay-label { color: var(--gold); font-weight: 800; }

        .pay-row input {
            width: 130px;
            padding: 7px 10px;
            border-radius: 8px;
            border: 1px solid var(--gold-border);
            background: var(--bg4);
            color: var(--gold);
            font-size: 14px;
            font-weight: 800;
            text-align: right;
        }

        .pay-row input:focus { outline: none; border-color: var(--gold); }
        .pay-row input[readonly] { background: transparent; border-color: transparent; cursor: default; }
        .pay-row.highlight input[readonly] { font-size: 16px; }

        /* ── LOADING ── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .loading-overlay.hidden { display: none; }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,215,0,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: var(--gold);
            font-size: 14px;
            font-weight: 700;
        }

        /* ── TOAST ── */
        #toast-container {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9998;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 90%;
            max-width: 340px;
            pointer-events: none;
        }

        .toast {
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            opacity: 0;
            transform: translateY(12px) scale(0.95);
            transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
            text-align: center;
        }

        .toast.show { opacity: 1; transform: translateY(0) scale(1); }
        .toast.success { background: #1a3a1a; color: var(--success); border: 1px solid rgba(50,205,50,0.3); }
        .toast.error   { background: #3a1a1a; color: var(--error);   border: 1px solid rgba(255,107,107,0.3); }
        .toast.info    { background: #1a2a3a; color: var(--info);    border: 1px solid rgba(74,158,255,0.3); }
        .toast.warning { background: #3a2a1a; color: var(--warning); border: 1px solid rgba(255,165,0,0.3); }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.show { display: flex; }

        .modal-box {
            background: var(--bg3);
            border: 1px solid var(--gold-border);
            border-radius: 14px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
        }

        .modal-title { font-size: 16px; font-weight: 800; color: var(--gold); margin-bottom: 10px; }
        .modal-text  { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 18px; }

        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

        .modal-btn {
            padding: 9px 18px;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        .modal-btn-primary   { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; }
        .modal-btn-secondary { background: var(--bg4); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Caricamento dati...</div>
</div>

<!-- HEADER -->
<header class="app-header">
    <div class="header-top">
        <div class="app-title">
            <span class="logo">€</span>
            <span class="app-name">Calendario Presenze</span>
        </div>
        <div class="sync-badge" id="syncBadge">
            <div class="sync-dot"></div>
            <span id="syncText">...</span>
        </div>
    </div>
    <div class="header-row2">
        <select id="yearSelect"></select>
        <button class="btn" onclick="manualSync()">☁️ Sync</button>
        <button class="btn" onclick="exportData()">💾 Backup</button>
        <button class="btn" onclick="document.getElementById('fileIn').click()">📂 Carica</button>
        <input type="file" id="fileIn" style="display:none" accept=".json" onchange="importData(event)">
    </div>
</header>

<!-- CONTENT -->
<div id="content"></div>

<!-- TABS -->
<nav class="tabs-bar">
    <div class="tabs" id="tabBar"></div>
</nav>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- MODAL -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
        <div class="modal-title" id="confirmTitle"></div>
        <div class="modal-text"  id="confirmText"></div>
        <div class="modal-btns">
            <button class="modal-btn modal-btn-secondary" id="confirmCancel">Annulla</button>
            <button class="modal-btn modal-btn-primary"   id="confirmOk">Conferma</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbyxwGB7vKvRprMNv5vBABkjL7Qi2z1TUkjxKp__jWrlgeGyTGTWEoVMy9KLT6A7786d/exec';

const RATES = { roma:100, trasferta:120, straordinari:15.60, sabato:145, domenica:170, ferie:100 };
const COLS       = ['roma','trasferta','straordinari','sabato','domenica','ferie'];
const COLS_SHORT = ['Roma','Trasf.','Str.','Sab.','Dom.','Ferie'];
const MONTHS     = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const HOLIDAYS   = [{m:0,d:1},{m:0,d:6},{m:3,d:25},{m:4,d:1},{m:5,d:2},{m:7,d:15},{m:10,d:1},{m:11,d:8},{m:11,d:25},{m:11,d:26}];
const STORAGE_KEY = 'presenze_v6';
const AUTOSAVE_MS = 800;

let curYear  = new Date().getFullYear();
let curMonth = new Date().getMonth();
let autoSaveTimer = null;

// ============================================================
// GOOGLE SHEETS — UNICA FONTE DI VERITA
// ============================================================
async function sheetsLoad() {
    try {
        const res = await fetch(API_URL + '?t=' + Date.now());
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return data;
    } catch(e) {
        console.error('sheetsLoad error:', e);
        return null;
    }
}

async function sheetsSave(data) {
    try {
        data._lastModified = new Date().toISOString();
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(data)
        });
        const json = await res.json();
        return json.ok === true;
    } catch(e) {
        console.error('sheetsSave error:', e);
        return false;
    }
}

// localStorage solo come cache temporanea
function cacheGet() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}

function cacheSet(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

// ============================================================
// SYNC STATUS
// ============================================================
function setSyncState(state, text) {
    const badge = document.getElementById('syncBadge');
    const label = document.getElementById('syncText');
    badge.className = 'sync-badge ' + state;
    label.textContent = text;
}

function showLoading(text) {
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingOverlay').classList.remove('hidden');
}

function hideLoading() {
    document.getElementById('loadingOverlay').classList.add('hidden');
}

// ============================================================
// INIT
// ============================================================
async function init() {
    // Deregistra service worker vecchi
    if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        regs.forEach(r => r.unregister());
    }

    // Anno selector
    const ys = document.getElementById('yearSelect');
    for (let y = 2024; y <= 2035; y++) {
        const o = document.createElement('option');
        o.value = y; o.textContent = y;
        ys.appendChild(o);
    }
    ys.value = curYear;
    ys.onchange = e => { curYear = +e.target.value; render(); loadMonth(); };

    render();

    // Carica da Sheets all'avvio
    showLoading('Caricamento dati dal cloud...');
    setSyncState('syncing', 'Caricamento...');

    const remote = await sheetsLoad();
    if (remote && Object.keys(remote).filter(k=>!k.startsWith('_')).length > 0) {
        cacheSet(remote);
        setSyncState('ok', 'Sincronizzato');
        showToast('✅ Dati caricati', 'success');
    } else {
        // Niente su Sheets, usa cache locale se disponibile
        const local = cacheGet();
        if (Object.keys(local).filter(k=>!k.startsWith('_')).length > 0) {
            setSyncState('error', 'Solo locale');
            showToast('⚠️ Uso dati locali', 'warning');
        } else {
            setSyncState('error', 'Nessun dato');
        }
    }

    hideLoading();
    loadMonth();
}

// ============================================================
// MANUAL SYNC — scarica sempre da Sheets
// ============================================================
async function manualSync() {
    showLoading('Sincronizzazione...');
    setSyncState('syncing', 'Sync...');

    const remote = await sheetsLoad();
    if (remote) {
        cacheSet(remote);
        loadMonth();
        setSyncState('ok', 'Sincronizzato');
        showToast('📥 Dati aggiornati', 'success');
    } else {
        setSyncState('error', 'Errore');
        showToast('❌ Errore connessione', 'error');
    }

    hideLoading();
}

// ============================================================
// AUTOSAVE — salva su Sheets dopo ogni modifica
// ============================================================
function scheduleSave() {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(doSave, AUTOSAVE_MS);
}

async function doSave() {
    const data = cacheGet();
    if (!data[curYear]) data[curYear] = {};
    if (!data[curYear][curMonth]) data[curYear][curMonth] = { v:{}, a:0 };

    const vals = {};
    document.querySelectorAll('input[data-d]').forEach(inp => {
        if (inp.value.trim()) vals[`${inp.dataset.d}-${inp.dataset.c}`] = sanitize(inp.value);
    });

    const accEl = document.getElementById('acc');
    const accNum = parseFloat((accEl?.value||'').replace(/[^\d.,]/g,'').replace(',','.')) || 0;

    data[curYear][curMonth].v = vals;
    data[curYear][curMonth].a = accNum;

    cacheSet(data);
    setSyncState('syncing', 'Salvataggio...');

    const ok = await sheetsSave(data);
    if (ok) {
        setSyncState('ok', 'Salvato');
    } else {
        setSyncState('error', 'Errore salvataggio');
        showToast('❌ Errore salvataggio cloud', 'error');
    }
}

// ============================================================
// RENDER
// ============================================================
function render() {
    const tabBar = document.getElementById('tabBar');
    tabBar.innerHTML = '';
    MONTHS.forEach((m, i) => {
        const b = document.createElement('button');
        b.className = 'tab' + (i === curMonth ? ' active' : '');
        b.textContent = m.slice(0,3);
        b.onclick = () => { curMonth = i; render(); loadMonth(); };
        tabBar.appendChild(b);
    });
    tabBar.querySelector('.tab.active')?.scrollIntoView({inline:'center', block:'nearest'});

    const days = new Date(curYear, curMonth + 1, 0).getDate();

    // Calcola larghezza colonne in base allo schermo
    const screenW = window.innerWidth - 8; // margini 4px*2
    const dateColW = 58;
    const availW = screenW - dateColW;
    const colW = Math.max(70, Math.floor(availW / COLS.length));

    const frag = document.createDocumentFragment();
    const outer = document.createElement('div');
    outer.className = 'table-outer';

    // ── HEADER FISSO ──
    const headerWrap = document.createElement('div');
    headerWrap.className = 'table-header-wrap';
    headerWrap.id = 'tableHeaderWrap';

    const headerTable = document.createElement('table');
    const hrow = headerTable.insertRow();

    const thDate = document.createElement('th');
    thDate.textContent = 'Data';
    thDate.style.width = dateColW + 'px';
    hrow.appendChild(thDate);

    COLS_SHORT.forEach(label => {
        const th = document.createElement('th');
        th.textContent = label;
        th.style.width = colW + 'px';
        hrow.appendChild(th);
    });

    headerWrap.appendChild(headerTable);
    outer.appendChild(headerWrap);

    // ── BODY ──
    const bodyWrap = document.createElement('div');
    bodyWrap.className = 'table-body-wrap';
    bodyWrap.id = 'tableBodyWrap';

    const table = document.createElement('table');
    const tbody = table.createTBody();

    for (let d = 1; d <= days; d++) {
        const date = new Date(curYear, curMonth, d);
        const dayName = date.toLocaleDateString('it-IT', {weekday:'short'});
        const isWeekend = date.getDay() === 0 || date.getDay() === 6 ||
                          HOLIDAYS.some(x => x.m === curMonth && x.d === d);

        const row = tbody.insertRow();
        if (isWeekend) row.className = 'weekend';

        const dateCell = row.insertCell();
        dateCell.textContent = `${d} ${dayName}`;
        dateCell.style.width = dateColW + 'px';

        COLS.forEach((c, ci) => {
            const cell = row.insertCell();
            cell.style.width = colW + 'px';
            const inp = document.createElement('input');
            inp.type = 'text';
            inp.dataset.d = d;
            inp.dataset.c = c;
            inp.autocomplete = 'off';
            inp.maxLength = 30;
            inp.placeholder = COLS_SHORT[ci];
            if (c === 'straordinari') inp.inputMode = 'decimal';
            inp.addEventListener('input', () => { inp.value = sanitize(inp.value); handleInput(); });
            cell.appendChild(inp);
        });
    }

    // TOTALS
    const trLabel = tbody.insertRow();
    trLabel.className = 'totals-label';
    const tdLabel = trLabel.insertCell();
    tdLabel.colSpan = 7;
    tdLabel.textContent = '💰 Totali Mese';

    const trNum = tbody.insertRow();
    trNum.className = 'totals-numbers';
    trNum.id = 'rowNumbers';
    trNum.insertCell();
    COLS.forEach(() => trNum.insertCell());

    const trAmt = tbody.insertRow();
    trAmt.className = 'totals-amounts';
    trAmt.id = 'rowAmounts';
    trAmt.insertCell();
    COLS.forEach(() => trAmt.insertCell());

    bodyWrap.appendChild(table);
    outer.appendChild(bodyWrap);

    // Sync scroll header/body
    bodyWrap.addEventListener('scroll', () => { headerWrap.scrollLeft = bodyWrap.scrollLeft; });

    frag.appendChild(outer);

    // SUMMARY
    const summary = document.createElement('div');
    summary.className = 'summary';
    summary.innerHTML = `
        <div class="summary-title">💰 Riepilogo Economico</div>
        <div class="pay-row"><span class="pay-label">Totale mese</span><input id="totM" type="text" readonly placeholder="€ 0,00"></div>
        <div class="pay-row"><span class="pay-label">Acconto</span><input id="acc" type="text" inputmode="decimal" placeholder="0,00"></div>
        <div class="pay-row"><span class="pay-label">Restante</span><input id="res" type="text" readonly placeholder="€ 0,00"></div>
        <div class="pay-row highlight"><span class="pay-label">💰 Progressivo Anno</span><input id="ann" type="text" readonly placeholder="€ 0,00"></div>
    `;
    frag.appendChild(summary);

    const content = document.getElementById('content');
    content.innerHTML = '';
    content.appendChild(frag);

    document.getElementById('acc').addEventListener('input', handleInput);
    document.getElementById('acc').addEventListener('blur', formatAcconto);
}

// ============================================================
// LOAD MONTH
// ============================================================
function loadMonth() {
    const data = cacheGet();
    const mData = data[curYear]?.[curMonth];

    // Pulisci inputs
    document.querySelectorAll('input[data-d]').forEach(inp => inp.value = '');

    if (mData?.v) {
        Object.entries(mData.v).forEach(([k, val]) => {
            const [d, c] = k.split('-');
            const inp = document.querySelector(`input[data-d="${d}"][data-c="${c}"]`);
            if (inp) inp.value = val;
        });
    }

    const accEl = document.getElementById('acc');
    if (accEl && mData?.a) {
        const n = parseFloat(mData.a);
        accEl.value = (!isNaN(n) && n > 0) ? fmt(n) : '';
    } else if (accEl) {
        accEl.value = '';
    }

    calc();
}

// ============================================================
// INPUT / CALC
// ============================================================
function sanitize(v) { return typeof v==='string' ? v.replace(/[<>]/g,'').substring(0,30) : ''; }

function handleInput() { calc(); scheduleSave(); }

function calc() {
    const totals = {};
    COLS.forEach(c => {
        let q = 0;
        document.querySelectorAll(`input[data-c="${c}"]`).forEach(inp => {
            if (inp.value.trim()) q += c==='straordinari' ? (parseFloat(inp.value.replace(',','.')) || 0) : 1;
        });
        totals[c] = q;
    });

    let totalMese = 0;
    COLS.forEach(c => { totalMese += totals[c] * RATES[c]; });

    const accRaw = (document.getElementById('acc')?.value||'').replace(/[^\d.,]/g,'').replace(',','.');
    const acc = parseFloat(accRaw) || 0;
    const resto = totalMese - acc;

    setVal('totM', totalMese > 0 ? fmt(totalMese) : '');
    setVal('res',  (totalMese > 0 || acc > 0) ? fmt(resto) : '');

    // Progressivo anno
    const data = cacheGet();
    let totAnno = 0;
    for (let m = 0; m <= curMonth; m++) {
        if (m === curMonth) {
            totAnno += resto;
        } else if (data[curYear]?.[m]) {
            const mData = data[curYear][m];
            let mTot = 0;
            COLS.forEach(c => {
                let q = 0;
                Object.keys(mData.v||{}).forEach(k => {
                    if (k.endsWith('-'+c)) q += c==='straordinari' ? (parseFloat(mData.v[k])||0) : 1;
                });
                mTot += q * RATES[c];
            });
            totAnno += mTot - (parseFloat(mData.a)||0);
        }
    }
    setVal('ann', totAnno !== 0 ? fmt(totAnno) : '');

    // Aggiorna totals rows
    const numCells = document.querySelectorAll('#rowNumbers td');
    const amtCells = document.querySelectorAll('#rowAmounts td');
    if (numCells.length) {
        COLS.forEach((c,i) => {
            const count = c==='straordinari' ? totals[c].toFixed(1) : totals[c];
            numCells[i+1].textContent = totals[c] > 0 ? count : '—';
            const amt = totals[c] * RATES[c];
            amtCells[i+1].textContent = amt > 0 ? fmt(amt) : '—';
        });
    }
}

function fmt(n) { return '€ ' + n.toFixed(2); }
function setVal(id, v) { const el = document.getElementById(id); if(el) el.value = v; }

function formatAcconto() {
    const el = document.getElementById('acc');
    if (!el) return;
    const n = parseFloat(el.value.replace(/[^\d.,]/g,'').replace(',','.'));
    el.value = (!isNaN(n) && n > 0) ? fmt(n) : '';
    calc();
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
    const raw = localStorage.getItem(STORAGE_KEY) || '{}';
    const now = new Date();
    const stamp = now.toLocaleDateString('it-IT').replace(/\//g,'-') + '_' +
                  now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}).replace(':','-');
    const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([raw],{type:'application/json'})),
        download: `Presenze_${stamp}.json`
    });
    document.body.appendChild(a); a.click(); a.remove();
    showToast('✅ Backup esportato', 'success');
}

function importData(e) {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
        try {
            const imported = JSON.parse(ev.target.result);
            showConfirm('⚠️ Importa backup', 'Sovrascrive tutti i dati attuali. Continuare?', async () => {
                cacheSet(imported);
                showLoading('Caricamento su cloud...');
                const ok = await sheetsSave(imported);
                hideLoading();
                if (ok) {
                    loadMonth();
                    showToast('✅ Dati importati e salvati', 'success');
                    setSyncState('ok', 'Sincronizzato');
                } else {
                    showToast('⚠️ Importati ma errore cloud', 'warning');
                }
            });
        } catch(err) {
            showToast('❌ File non valido', 'error');
        }
    };
    reader.readAsText(file);
}

// ============================================================
// MODAL
// ============================================================
function showConfirm(title, text, onOk) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmText').textContent = text;
    const modal = document.getElementById('confirmModal');
    modal.classList.add('show');
    document.getElementById('confirmOk').onclick     = () => { modal.classList.remove('show'); onOk(); };
    document.getElementById('confirmCancel').onclick = () => modal.classList.remove('show');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type='info') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
}

// ============================================================
// START
// ============================================================
window.addEventListener('beforeunload', () => {
    clearTimeout(autoSaveTimer);
});

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
